<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - SwiftCart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/2b4a5952d6.js" crossorigin="anonymous"></script>
</head>

<body>
    <nav class="bg-gray-800 text-white">
        <div class="container mx-auto flex items-center justify-between p-4">
            <div class="logo text-2xl font-bold">
                SwiftCart
            </div>
            <ul class="hidden md:flex flex-1 justify-center gap-6">
                <li><a href="./index.html" class="hover:text-gray-300">Home</a></li>
                <li><a href="./products.html" class="hover:text-gray-300">Products</a></li>
                <li><a href="./about.html" class="hover:text-gray-300">About</a></li>
                <li><a href="./contact.html" class="hover:text-gray-300">Contact</a></li>
            </ul>
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-cart-arrow-down text-xl"></i>
                <button id="menu-btn" class="text-2xl md:hidden focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <ul id="mobile-menu" class="hidden flex-col gap-4 px-4 pb-4 md:hidden bg-gray-700">
            <li><a href="./index.html" class="block text-white">Home</a></li>
            <li><a href="./products.html" class="block text-white">Products</a></li>
            <li><a href="./about.html" class="block text-white">About</a></li>
            <li><a href="./contact.html" class="block text-white">Contact</a></li>
        </ul>
    </nav>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

    <main class="py-16">
        <div class="container mx-auto text-left mb-12 px-4">
            <h2 class="text-4xl font-bold">All Products</h2>
            <p class="text-gray-600 mt-2">Browse our full catalog of high-quality items.</p>
        </div>
        
        <div id="all-products-container" class="container mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 px-4">
            </div>
    </main>

    <footer class="bg-gray-900 text-gray-300 py-12">
        <div class="container mx-auto text-center border-t border-gray-700 pt-8">
            <p>&copy; 2026 SwiftCart. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
